services:
  server:
    build: 
      context: .
      target: server
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    volumes:
      - ./server:/server
      - /server/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - client
      - phpmyadmin
    restart: unless-stopped


  client:
    build: 
      context: .
      target: client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/client
      - /client/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped

  db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: sample
      MYSQL_DATABASE: mydb
    ports: 
      - "3307:3306"
    volumes:
      - my-db-volume:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: sample
    ports:
      - "8080:80"
    depends_on:
      - db
  
volumes:
  my-db-volume: