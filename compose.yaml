services:
  server:
    build: 
      context: .
      target: server
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    volumes:
      - ./server:/server
      - /server/node_modules
    depends_on:
      - client
    restart: unless-stopped


  client:
    build: 
      context: .
      target: client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/client
      - /client/node_modules
    restart: unless-stopped